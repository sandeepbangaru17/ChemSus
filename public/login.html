<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ChemSus Technologies</title>
  <link rel="icon" type="image/png" href="assets/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0074c7; --primary-dark: #00508a; --accent: #00b8b0;
      --bg: #f3f7fb; --ink: #1f2933; --muted: #64748b; --border: #e2e8f0;
      --err: #ef4444; --ok: #059669; --ok-bg: #ecfdf5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Open Sans", Arial, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .logo-wrap { margin-bottom: 28px; }
    .logo-wrap img { height: 42px; }

    .card {
      background: #fff; border-radius: 18px; box-shadow: 0 12px 40px rgba(15,23,42,.10);
      padding: 36px 32px 28px; width: 100%; max-width: 420px;
    }
    .card-title { font-family: "Montserrat", sans-serif; font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Form */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 14px; color: var(--ink); outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: var(--primary); }

    .btn-row { display: flex; gap: 8px; margin-top: 6px; }
    .btn-sm { padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .btn-submit {
      width: 100%; padding: 13px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: "Montserrat", sans-serif; cursor: pointer; margin-top: 8px; transition: all .2s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,116,199,.3); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .alert { padding: 11px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 14px; display: none; }
    .alert.err { background: #fee2e2; color: var(--err); border: 1px solid #fecaca; display: block; }
    .alert.ok { background: var(--ok-bg); color: var(--ok); border: 1px solid #6ee7b7; display: block; }

    .divider { text-align: center; font-size: 12px; color: var(--muted); margin: 16px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .guest-btn {
      width: 100%; padding: 12px; background: transparent; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer;
      transition: all .2s; margin-top: 4px;
    }
    .guest-btn:hover { border-color: var(--accent); color: var(--accent); }

    .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .footer-links a { font-weight: 600; }

    .otp-status { font-size: 12px; margin-top: 4px; }
    .otp-status.ok { color: var(--ok); }
    .otp-status.err { color: var(--err); }

    .step { display: none; }
    .step.active { display: block; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px 22px; border-radius: 14px; }
      .card-title { font-size: 19px; }
    }

    @media (max-width: 360px) {
      body { padding: 16px 12px; }
      .card { padding: 22px 16px 18px; }
      .field input { padding: 9px 12px; }
      .btn-submit { padding: 11px; font-size: 14px; }
    }

    /* Ensure inputs are full-width on all mobile */
    @media (max-width: 480px) {
      .field input { font-size: 16px; /* prevent iOS zoom */ }
      .btn-row { flex-direction: column; }
      .btn-row .btn-submit { flex: none; width: 100%; margin-top: 0; }
      .logo-wrap img { height: 36px; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <a href="index.html"><img src="assets/logo.jpg" alt="ChemSus"></a>
  </div>

  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Log in to your ChemSus account</p>

    <div class="tabs">
      <div class="tab active" id="tabPwd" onclick="switchTab('pwd')">Password</div>
      <div class="tab" id="tabOtp" onclick="switchTab('otp')">Login with OTP</div>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- ── Password login ── -->
    <div id="panePwd" class="step active">
      <div class="field">
        <label>Email</label>
        <input type="email" id="pwdEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pwdPass" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')loginPassword()">
      </div>
      <button class="btn-submit" id="pwdBtn" onclick="loginPassword()">Log In</button>
      <p style="text-align:right;margin-top:10px;font-size:12px;">
        <a href="signup.html">Forgot password? Sign up again</a>
      </p>
    </div>

    <!-- ── OTP login ── -->
    <div id="paneOtp" style="display:none;">
      <!-- Step 1: enter email, send OTP -->
      <div id="otpStep1" class="step active">
        <div class="field">
          <label>Email</label>
          <input type="email" id="otpEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <button class="btn-submit" id="otpSendBtn" onclick="sendLoginOtp()">Send OTP</button>
      </div>
      <!-- Step 2: enter OTP -->
      <div id="otpStep2" class="step">
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">OTP sent to <b id="otpEmailDisplay"></b></p>
        <div class="field">
          <label>6-digit OTP</label>
          <input type="text" id="otpCode" placeholder="Enter OTP" inputmode="numeric" maxlength="6"
            onkeydown="if(event.key==='Enter')verifyLoginOtp()">
        </div>
        <div class="btn-row">
          <button class="btn-sm btn-outline" id="otpResendBtn" onclick="sendLoginOtp(true)">Resend</button>
          <button class="btn-submit" style="flex:1;margin-top:0;" id="otpVerifyBtn" onclick="verifyLoginOtp()">Verify & Log In</button>
        </div>
        <p style="text-align:center;margin-top:10px;font-size:12px;color:var(--muted);" id="otpCountdown"></p>
      </div>
    </div>

    <div class="divider">or</div>
    <button class="guest-btn" onclick="continueAsGuest()">Continue as Guest →</button>
  </div>

  <div class="footer-links">
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>

  <script>
    const API = '/api/customer';
    let otpChallengeId = '';
    let otpCooldownTimer = null;
    let otpCooldownSec = 0;
    const returnUrl = new URLSearchParams(location.search).get('return') || 'my-orders.html';

    // Redirect if already logged in
    (function () {
      const tok = localStorage.getItem('chemsus_customer_token');
      const exp = Number(localStorage.getItem('chemsus_customer_token_exp') || 0);
      if (tok && (!exp || Date.now() / 1000 < exp)) {
        window.location.replace(returnUrl);
      }
    })();

    function showAlert(msg, type = 'err') {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }
    function clearAlert() {
      const el = document.getElementById('alertBox');
      el.className = 'alert';
      el.textContent = '';
    }

    function switchTab(tab) {
      document.getElementById('tabPwd').classList.toggle('active', tab === 'pwd');
      document.getElementById('tabOtp').classList.toggle('active', tab === 'otp');
      document.getElementById('panePwd').style.display = tab === 'pwd' ? 'block' : 'none';
      document.getElementById('paneOtp').style.display = tab === 'otp' ? 'block' : 'none';
      clearAlert();
    }

    function saveToken(token, expiresAt) {
      localStorage.setItem('chemsus_customer_token', token);
      localStorage.setItem('chemsus_customer_token_exp', String(expiresAt));
    }

    function onLoginSuccess(data) {
      saveToken(data.token, data.expiresAt);
      if (data.profile?.name) localStorage.setItem('chemsus_customer_name', data.profile.name);
      showAlert('Logged in! Redirecting…', 'ok');
      setTimeout(() => window.location.replace(returnUrl), 800);
    }

    async function loginPassword() {
      const email = document.getElementById('pwdEmail').value.trim();
      const password = document.getElementById('pwdPass').value;
      if (!email || !password) { showAlert('Enter email and password.'); return; }
      const btn = document.getElementById('pwdBtn');
      btn.disabled = true; btn.textContent = 'Logging in…';
      clearAlert();
      try {
        const r = await fetch(API + '/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Login failed');
        onLoginSuccess(d);
      } catch (e) {
        showAlert(e.message);
        btn.disabled = false; btn.textContent = 'Log In';
      }
    }

    async function sendLoginOtp(isResend = false) {
      const email = (document.getElementById('otpEmail').value || '').trim();
      if (!email) { showAlert('Enter your email first.'); return; }
      clearAlert();
      const btn = document.getElementById('otpSendBtn');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const r = await fetch(API + '/send-login-otp', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Failed to send OTP');
        otpChallengeId = d.challengeId;
        document.getElementById('otpEmailDisplay').textContent = email;
        document.getElementById('otpStep1').classList.remove('active');
        document.getElementById('otpStep2').classList.add('active');
        startOtpCooldown(d.resendInSec || 60);
        showAlert('OTP sent to ' + email, 'ok');
      } catch (e) {
        showAlert(e.message);
        btn.disabled = false; btn.textContent = isResend ? 'Resend OTP' : 'Send OTP';
      }
    }

    function startOtpCooldown(sec) {
      if (otpCooldownTimer) clearInterval(otpCooldownTimer);
      otpCooldownSec = sec;
      const btn = document.getElementById('otpResendBtn');
      const cd = document.getElementById('otpCountdown');
      btn.disabled = true;
      otpCooldownTimer = setInterval(() => {
        otpCooldownSec--;
        cd.textContent = otpCooldownSec > 0 ? `Resend in ${otpCooldownSec}s` : '';
        if (otpCooldownSec <= 0) {
          clearInterval(otpCooldownTimer);
          btn.disabled = false;
        }
      }, 1000);
    }

    async function verifyLoginOtp() {
      const email = (document.getElementById('otpEmail').value || '').trim();
      const otp = (document.getElementById('otpCode').value || '').trim();
      if (!otp || otp.length !== 6) { showAlert('Enter the 6-digit OTP.'); return; }
      clearAlert();
      const btn = document.getElementById('otpVerifyBtn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      try {
        const r = await fetch(API + '/login-otp', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp, challengeId: otpChallengeId })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Verification failed');
        onLoginSuccess(d);
      } catch (e) {
        showAlert(e.message);
        btn.disabled = false; btn.textContent = 'Verify & Log In';
      }
    }

    function continueAsGuest() {
      window.location.href = returnUrl.includes('my-orders') ? 'shop.html' : returnUrl;
    }
  </script>
</body>
</html>
